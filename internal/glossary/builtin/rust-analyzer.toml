# rust-analyzer 专属术语词汇本（内置默认版本）
#
# 本文件由 LspProxy 内嵌发布，首次启动时自动释放到词汇本目录。
# 释放后即成为用户可编辑的本地副本——您可以自由增删改任何条目。
# LspProxy 升级时不会覆盖此文件，您的修改将始终保留。
#
# 格式说明：
#   [terms] 节下每行为一条术语映射
#   key   = 原文（英文），区分大小写，精确匹配整段文本
#   value = 译文（中文）
#
# 设计原则：
#   1. 有明确中文共识的术语 → 提供准确翻译（如 ownership → 所有权）
#   2. 中文社区习惯直接用原文的 → key = value 保持原文，充当「翻译护盾」
#      防止在线翻译引擎把 trait 翻译成「特点」、Send 翻译成「发送」之类的问题
#   3. 部分术语采用「原文（中文注释）」格式，兼顾可读性和准确性
#
# 欢迎向社区贡献更多术语：https://github.com/zerx-lab/LspProxy

[terms]
